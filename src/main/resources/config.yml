zone:
  world: world
  center:
    x: 0.0
    z: 0.0
  radius: 100.0

shards-per-minute: 1

# %player% = player name, %amount% = amount
shard-command: "shardmanager add %player% %amount%"

messages:
  received: "&d+%amount% Gems"
  actionbar-in-zone: "&d\u2764 Gem Zone &7| &fNext gem in &d%seconds%s"
  actionbar-out-zone: ""
  afk: "&7Teleporting to AFK area..."
  blocked-command: "&cUnknown command."

# Format: x,y,z,yaw,pitch,world
afk-location: "0.5,0.0,0.5,0.0,0.0,spawn"
blocked-commands:
  - /pl
  - /plugins
  - /ver
  - /version
  - /bukkit:plugins

